<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мои чеки + калории</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10b981">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f5f7fa; color: #1e293b; padding: 20px; }
        body.dark { background: #0f172a; color: #e2e8f0; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
        h1 { font-size: 1.8rem; background: linear-gradient(135deg, #10b981, #059669); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .btn-icon { background: #e2e8f0; border: none; padding: 8px 12px; border-radius: 40px; cursor: pointer; margin-left: 4px; }
        .dark .btn-icon { background: #1e293b; color: #e2e8f0; }
        .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; border-bottom: 1px solid #cbd5e1; padding-bottom: 8px; }
        .tab-btn { background: none; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; }
        .tab-btn.active { background: #10b981; color: white; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        .card { background: white; border-radius: 28px; padding: 20px; margin-bottom: 24px; }
        .dark .card { background: #1e293b; }
        input, textarea, select { width: 100%; padding: 12px; border-radius: 20px; border: 1px solid #cbd5e1; margin-bottom: 12px; }
        .dark input, .dark textarea, .dark select { background: #0f172a; color: #e2e8f0; border-color: #334155; }
        button { background: #10b981; color: white; border: none; padding: 12px 20px; border-radius: 40px; cursor: pointer; }
        .delete-btn { background: #ef4444; padding: 6px 14px; border-radius: 30px; font-size: 0.8rem; }
        .edit-btn { background: #f59e0b; padding: 6px 14px; border-radius: 30px; font-size: 0.8rem; margin-right: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #e2e8f0; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: #f1f5f9; padding: 16px; border-radius: 28px; text-align: center; }
        .dark .stat-card { background: #0f172a; }
        .stat-value { font-size: 2rem; font-weight: bold; color: #10b981; }
        .shopping-item { display: flex; align-items: center; gap: 16px; padding: 12px 8px; border-bottom: 1px solid #e2e8f0; }
        .shopping-item input[type="checkbox"] { width: 24px; height: 24px; margin: 0; }
        .shopping-item .item-name { flex: 1; }
        .food-form { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
        .food-form input { flex: 1; margin-bottom: 0; }
        .settings-panel { background: #f1f5f9; border-radius: 28px; padding: 16px; margin-bottom: 20px; }
        .dark .settings-panel { background: #0f172a; }
        .sync-status { font-size: 13px; margin-top: 10px; padding: 8px; border-radius: 20px; background: #e2e8f0; text-align: center; }
        .dark .sync-status { background: #1e293b; }
        .error-details { font-size: 11px; color: #ef4444; word-break: break-all; margin-top: 5px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏠 Мои чеки + 🍎 Калории</h1>
        <div>
            <button id="syncToDiskBtn" class="btn-icon">☁️ Сохранить</button>
            <button id="loadFromDiskBtn" class="btn-icon">☁️ Загрузить</button>
            <button id="loginYandexBtn" class="btn-icon">🔑 Войти</button>
            <button id="themeToggle" class="btn-icon">🌙</button>
        </div>
    </div>

    <div id="syncStatus" class="sync-status"></div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="add">➕ Чек</button>
        <button class="tab-btn" data-tab="list">📋 Покупки</button>
        <button class="tab-btn" data-tab="stats">📊 Статистика</button>
        <button class="tab-btn" data-tab="shopping">🛒 Список</button>
        <button class="tab-btn" data-tab="calories">🍎 Калории</button>
    </div>

    <!-- Вкладки (без изменений) -->
    <div class="tab-pane active" id="tab-add">
        <div class="card"><h3>Добавить чек (JSON)</h3><textarea id="jsonInput" rows="3" placeholder='{"date":"2026-06-05","items":[{"name":"Молоко","price":79.99,"quantity":1,"total":79.99}]}'></textarea><button id="addJsonBtn">➕ Добавить чек</button></div>
        <div class="card"><h3>Ручное добавление</h3><input id="manualName" placeholder="Название"><input id="manualPrice" placeholder="Цена" step="0.01"><input id="manualQuantity" placeholder="Кол-во" step="0.01" value="1"><input type="date" id="manualDate"><button id="addManualBtn">➕ Добавить товар</button></div>
    </div>

    <div class="tab-pane" id="tab-list"><div class="card"><h3>История покупок</h3><input type="text" id="searchInput" placeholder="🔍 Поиск"><div id="searchTotal" style="margin:10px 0;"></div><table id="purchasesTable"><thead><tr><th>Дата</th><th>Название</th><th>Категория</th><th>Цена</th><th>Кол-во</th><th>Сумма</th><th></th></tr></thead><tbody id="tableBody"></tbody></table></div></div>

    <div class="tab-pane" id="tab-stats"><div class="stats-grid" id="statsGrid"></div><div class="card"><canvas id="categoryChart"></canvas></div></div>

    <div class="tab-pane" id="tab-shopping"><div class="card"><h3>Список покупок</h3><textarea id="shoppingJsonInput" rows="2" placeholder='{"list":["Молоко","Хлеб"]}'></textarea><button id="addShoppingListBtn" style="margin:8px 0;">📥 Добавить из JSON</button><div style="display:flex; gap:10px;"><input id="newItemName" placeholder="Новый товар" style="flex:2"><button id="addItemBtn">➕ Добавить</button></div><div id="shoppingListContainer" style="margin-top:16px;"></div></div></div>

    <div class="tab-pane" id="tab-calories"><div class="card"><h3>Дневник питания</h3><div class="food-form"><input id="foodName" placeholder="Продукт"><input id="foodCalories" placeholder="ккал" type="number"><input type="date" id="foodDate"><button id="addFoodBtn">➕ Добавить</button></div><div class="stats-grid" style="grid-template-columns:repeat(2,1fr);"><div class="stat-card"><div class="stat-value" id="todayCalories">0</div><div>ккал сегодня</div></div><div class="stat-card"><div class="stat-value" id="caloriesLeft">0</div><div>Осталось (2000)</div></div></div><table id="caloriesTable"><thead><tr><th>Дата</th><th>Продукт</th><th>ккал</th><th></th></tr></thead><tbody id="caloriesBody"></tbody></table></div></div>
</div>

<script>
    let purchases = [], shoppingList = [], calories = [], yandexToken = null;
    const CLIENT_ID = '2ae78c4d63ab42ed95c3242c63579c3b';
    const REDIRECT_URI = window.location.href.split('#')[0];
    const FILE_PATH = 'app:/budget_data.json';

    function showStatus(msg, isError = false, details = '') {
        const div = document.getElementById('syncStatus');
        if (div) {
            div.innerHTML = msg + (details ? `<div class="error-details">${details}</div>` : '');
            div.style.color = isError ? '#ef4444' : '#10b981';
            setTimeout(() => { if (div && !details) div.innerHTML = ''; }, 5000);
        }
    }

    function saveLocal() {
        localStorage.setItem('purchases', JSON.stringify(purchases));
        localStorage.setItem('shoppingList', JSON.stringify(shoppingList));
        localStorage.setItem('calories', JSON.stringify(calories));
    }

    function loadLocal() {
        purchases = JSON.parse(localStorage.getItem('purchases') || '[]');
        shoppingList = JSON.parse(localStorage.getItem('shoppingList') || '[]');
        calories = JSON.parse(localStorage.getItem('calories') || '[]');
        renderAll();
    }

    function getAuthUrl() { return `https://oauth.yandex.ru/authorize?response_type=token&client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`; }

    function checkAuth() {
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        if (params.has('access_token')) {
            yandexToken = params.get('access_token');
            localStorage.setItem('yandex_token', yandexToken);
            window.location.hash = '';
            showStatus('✅ Авторизация успешна');
            loadFromDisk();
            return true;
        }
        yandexToken = localStorage.getItem('yandex_token');
        if (yandexToken) loadFromDisk();
        return !!yandexToken;
    }

    async function loadFromDisk() {
        if (!yandexToken) { showStatus('❌ Не авторизованы', true); return; }
        showStatus('⏳ Загрузка с Яндекс.Диска...');
        try {
            const res = await fetch(`https://cloud-api.yandex.net/v1/disk/resources/download?path=${FILE_PATH}`, {
                headers: { 'Authorization': `OAuth ${yandexToken}` }
            });
            if (res.status === 200) {
                const data = await res.json();
                const fileRes = await fetch(data.href);
                const json = await fileRes.json();
                purchases = json.purchases || [];
                shoppingList = json.shoppingList || [];
                calories = json.calories || [];
                saveLocal();
                renderAll();
                showStatus('✅ Загружено с Яндекс.Диска');
            } else if (res.status === 404) {
                showStatus('📄 Файл на Диске не найден. Сохраните данные в первый раз.');
            } else {
                const errText = await res.text();
                throw new Error(`HTTP ${res.status}: ${errText.slice(0, 100)}`);
            }
        } catch(e) {
            showStatus('❌ Ошибка загрузки', true, e.message);
        }
    }

    async function saveToDisk() {
        if (!yandexToken) { showStatus('❌ Не авторизованы', true); return; }
        showStatus('⏳ Сохранение на Яндекс.Диск...');
        const content = { purchases, shoppingList, calories };
        try {
            const uploadUrl = await fetch(`https://cloud-api.yandex.net/v1/disk/resources/upload?path=${FILE_PATH}&overwrite=true`, {
                method: 'GET',
                headers: { 'Authorization': `OAuth ${yandexToken}` }
            }).then(r => r.json());
            const putRes = await fetch(uploadUrl.href, {
                method: 'PUT',
                body: JSON.stringify(content),
                headers: { 'Content-Type': 'application/json' }
            });
            if (!putRes.ok) throw new Error(`HTTP ${putRes.status}`);
            showStatus('✅ Сохранено на Яндекс.Диск');
        } catch(e) {
            showStatus('❌ Ошибка сохранения', true, e.message);
        }
    }

    // Все остальные функции (покупки, калории, список) — без изменений, они есть в предыдущих версиях
    // (я их скопирую из предыдущего рабочего кода, но здесь сокращаю для читаемости)

</script>

</body>
</html>
